[profile.default]
src = "src"
out = "out"
libs = ["lib"]
viaIR = true
optimizer = true
optimizer_runs = 200
solc = "0.8.28"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

remappings = [ 
    "@ccip/=lib/ccip/",
    "@chainlink-local/=lib/chainlink-local/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin-contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts"
]

[rpc_endpoints]
sepolia = "https://sepolia.infura.io/v3/e1e0aec60858435592f2aea4f20ab60f"
arbSepolia = "https://arb-sepolia.g.alchemy.com/v2/33uko4nisLPivFxYWytzetpTEHI9jtY-"

[etherscan]
sepolia = {key = "ERY7KIHSAWBP3UFV46HZKG64B78KZJWBAV"}

